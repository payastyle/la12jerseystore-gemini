<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle del Jersey - La 12</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Estilos rápidos para que la página se vea limpia */
        .pdp-contenedor {
            max-width: 1100px;
            margin: 140px auto 50px;
            padding: 0 20px;
        }
        .pdp-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
        }
        .pdp-galeria img {
            width: 100%;
            border-radius: 10px;
            border: 1px solid var(--color-borde);
        }
        .pdp-info h1 {
            color: var(--color-texto);
            font-size: 28px;
            margin-bottom: 10px;
        }
        .precios-pdp { margin: 20px 0; }
        .opciones h3 { 
            font-size: 14px; 
            color: #d4af37; 
            margin: 20px 0 10px; 
            text-transform: uppercase;
        }
        .btn-opcion {
            background: var(--bg-input);
            color: var(--color-texto);
            border: 1px solid var(--color-borde);
            padding: 10px 15px;
            margin: 0 5px 10px 0;
            cursor: pointer;
            border-radius: 5px;
        }
        .btn-opcion.seleccionada {
            border-color: #d4af37;
            background: rgba(212, 175, 55, 0.1);
            color: #d4af37;
        }
        @media (max-width: 768px) {
            .pdp-layout { grid-template-columns: 1fr; }
            .pdp-contenedor { margin-top: 160px; }
        }
    </style>
</head>
<body>

    <div class="promo-cintillo" style="background: #d4af37; color: #000; text-align: center; padding: 8px; font-weight: bold; font-size: 14px; position: fixed; top: 0; width: 100%; z-index: 1001;">
        🚚 ENVÍO GRATIS EN LA COMPRA DE 4 JERSEYS O MÁS
    </div>

    <header style="background: var(--bg-tarjetas); border-bottom: 1px solid var(--color-borde); position: fixed; top: 35px; width: 100%; z-index: 1000; padding: 10px 5%;">
        <div style="display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: auto;">
            <div class="logo" onclick="window.location.href='index.html'" style="cursor: pointer;">
                <img src="img/logo.png" alt="La 12" style="height: 40px;">
            </div>
            <div style="display: flex; align-items: center; gap: 20px;">
                <div onclick="toggleTheme()" style="cursor: pointer; font-size: 20px;"><span id="theme-icon">🌙</span></div>
                <div onclick="window.location.href='carrito.html'" style="cursor: pointer; position: relative; font-size: 22px;">
                    🛒 <span id="contador-carrito" style="background: #cc0000; color: #fff; border-radius: 50%; padding: 2px 6px; font-size: 11px; position: absolute; top: -8px; right: -10px;">0</span>
                </div>
            </div>
        </div>
    </header>

    <main class="pdp-contenedor" id="pdp-contenedor">
        <p style="text-align: center; color: #888;">Cargando detalles del jersey...</p>
    </main>

    <footer style="background: #000; padding: 40px 5%; border-top: 1px solid #333; text-align: center; margin-top: 50px;">
        <div class="social-links" style="display: flex; justify-content: center; gap: 20px; margin-bottom: 20px;">
            <a href="#"><img src="img/facebook.png" style="width: 30px;"></a>
            <a href="#"><img src="img/instagram.png" style="width: 30px;"></a>
            <a href="#"><img src="img/tiktok.png" style="width: 30px;"></a>
        </div>
        <p style="color: #666; font-size: 12px;">© 2026 La 12 Jersey Store</p>
    </footer>

    <script src="productos.js"></script>
    <script src="app.js"></script>
</body>
</html>
