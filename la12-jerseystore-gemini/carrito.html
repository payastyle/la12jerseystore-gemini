<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrito - La 12 Jersey Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="navbar">
        <div class="logo" onclick="window.location.href='index.html'">LA 12</div>
        <div id="contador-carrito">0</div>
    </header>

    <main class="checkout-container" style="display: flex; gap: 20px; padding: 20px; max-width: 1200px; margin: auto;">
        
        <div id="carrito-productos-lista" style="flex: 2;">
            </div>

        <div class="cart-summary-sidebar" style="flex: 1; background: #111; padding: 20px; border-radius: 8px;">
            <h3>Resumen</h3>

            <div id="seccion-cupon" style="margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid #333;">
                <p style="font-size: 14px; color: #aaa; margin-bottom: 10px;">¿Tienes un cupón?</p>
                <div style="display: flex; gap: 5px;">
                    <input type="text" id="input-cupon" placeholder="CÓDIGO" style="flex: 1; padding: 10px; background: #222; color: #fff; border: 1px solid #444;">
                    <button onclick="aplicarCupon()" style="background: #d4af37; color: #000; padding: 10px; border: none; font-weight: bold; cursor: pointer;">APLICAR</button>
                </div>
                <p id="mensaje-cupon" style="font-size: 12px; margin-top: 5px; font-weight: bold;"></p>
            </div>
            <div class="resumen-linea" style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                <span>Subtotal:</span>
                <span id="subtotal">$0.00</span>
            </div>
            <div class="resumen-linea" style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                <span>Envío:</span>
                <span id="envio">$0.00</span>
            </div>
            <div class="resumen-total" style="display: flex; justify-content: space-between; font-size: 20px; font-weight: bold; color: #d4af37; margin-top: 15px;">
                <span>Total:</span>
                <span id="total">$0.00</span>
            </div>

            <button class="btn-principal" onclick="finalizarCompraWhatsApp()" style="width: 100%; margin-top: 20px; padding: 15px; background: #25D366; color: #fff; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;">
                CONFIRMAR POR WHATSAPP
            </button>
        </div>
    </main>

    <script src="productos.js"></script>
    <script src="promo.js"></script> <script src="app.js"></script>
</body>
</html>
