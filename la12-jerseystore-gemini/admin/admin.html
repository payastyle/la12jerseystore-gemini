<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administración | La 12</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Estilos rápidos para que el Admin sea cómodo de usar */
        .admin-wrapper {
            max-width: 900px;
            margin: 50px auto;
            padding: 20px;
        }

        .admin-nav-tabs {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 40px;
        }

        .tab-button {
            background: var(--bg-tarjetas);
            border: 1px solid var(--color-borde);
            color: #888;
            padding: 15px 30px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            transition: 0.3s;
            flex: 1;
        }

        .tab-button.active {
            border-color: var(--dorado);
            color: var(--dorado);
            background: rgba(212, 175, 55, 0.1);
        }

        .admin-section {
            display: none;
            background: var(--bg-tarjetas);
            padding: 40px;
            border-radius: 15px;
            border: 1px solid var(--color-borde);
            animation: fadeInUp 0.4s ease;
        }

        .admin-section.active {
            display: block;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .form-full { grid-column: span 2; }

        .form-group { margin-bottom: 20px; }

        .form-group label {
            display: block;
            color: var(--dorado);
            font-size: 12px;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 12px;
            background: var(--bg-input);
            border: 1px solid var(--color-borde);
            color: #fff;
            border-radius: 6px;
        }

        .btn-crear {
            width: 100%;
            padding: 18px;
            background: var(--dorado);
            color: #000;
            border: none;
            font-weight: 800;
            border-radius: 30px;
            cursor: pointer;
            margin-top: 20px;
            text-transform: uppercase;
        }

        .output-container {
            margin-top: 30px;
            padding: 20px;
            background: #000;
            border: 1px dashed var(--dorado);
            border-radius: 10px;
            position: relative;
        }

        pre {
            color: #25D366;
            font-size: 13px;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .btn-copiar {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #333;
            color: #fff;
            border: none;
            padding: 5px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
        }
    </style>
</head>
<body>

    <div class="admin-wrapper">
        <h1 style="text-align: center; color: var(--dorado); margin-bottom: 40px; text-transform: uppercase; letter-spacing: 3px;">Centro de Mando La 12</h1>

        <div class="admin-nav-tabs">
            <button class="tab-button active" onclick="cambiarTab(event, 'sec-producto')">👕 Productos</button>
            <button class="tab-button" onclick="cambiarTab(event, 'sec-resena')">⭐ Reseñas</button>
            <button class="tab-button" onclick="cambiarTab(event, 'sec-promo')">🎫 Cupones</button>
        </div>

        <div id="sec-producto" class="admin-section active">
            <div class="form-grid">
                <div class="form-group form-full"><label>Nombre del Jersey</label><input type="text" id="p-nombre" placeholder="Ej: Tigres Local 25/26"></div>
                <div class="form-group"><label>ID (Ej: TIG-LOC-25)</label><input type="text" id="p-id"></div>
                <div class="form-group"><label>Liga / Categoría</label><input type="text" id="p-liga" placeholder="Liga MX / Retro"></div>
                <div class="form-group"><label>Precio Normal</label><input type="number" id="p-precioN"></div>
                <div class="form-group"><label>Precio Oferta</label><input type="number" id="p-precioO"></div>
                <div class="form-group"><label>Versión</label>
                    <select id="p-version">
                        <option value="Fan">Fan</option>
                        <option value="Jugador">Jugador</option>
                        <option value="Retro">Retro</option>
                        <option value="Kids">Kids</option>
                    </select>
                </div>
                <div class="form-group"><label>Nombre Imagen</label><input type="text" id="p-img" placeholder="img/foto.jpg"></div>
            </div>
            <button class="btn-crear" onclick="crearProducto()">Generar Código de Producto</button>
        </div>

        <div id="sec-resena" class="admin-section">
            <div class="form-grid">
                <div class="form-group"><label>Nombre Cliente</label><input type="text" id="r-nombre" placeholder="Julio C."></div>
                <div class="form-group"><label>Inicial</label><input type="text" id="r-inicial" maxlength="1" placeholder="J"></div>
                <div class="form-group form-full"><label>Comentario</label><textarea id="r-texto" rows="4"></textarea></div>
            </div>
            <button class="btn-crear" onclick="crearResena()">Generar Código de Reseña</button>
        </div>

        <div id="sec-promo" class="admin-section">
            <div class="form-group">
                <label>Nuevo Cupón (Mayúsculas)</label>
                <input type="text" id="c-codigo" placeholder="Ej: LA12NUEVO">
            </div>
            <button class="btn-crear" onclick="crearPromo()">Generar Código de Cupón</button>
        </div>

        <div id="salida-container" class="output-container" style="display: none;">
            <button class="btn-copiar" onclick="copiarAlPortapapeles()">COPIAR</button>
            <pre id="codigo-final"></pre>
        </div>
    </div>

    <script>
        function cambiarTab(evt, seccionId) {
            document.querySelectorAll('.admin-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab-button').forEach(b => b.classList.remove('active'));
            document.getElementById(seccionId).classList.add('active');
            evt.currentTarget.classList.add('active');
            document.getElementById('salida-container').style.display = 'none';
        }

        function crearProducto() {
            const code = `{
    id: "${document.getElementById('p-id').value}",
    nombre: "${document.getElementById('p-nombre').value}",
    precioNormal: ${document.getElementById('p-precioN').value},
    precio: ${document.getElementById('p-precioO').value},
    tipoProducto: "${document.getElementById('p-version').value}",
    liga: "${document.getElementById('p-liga').value}",
    marca: "Adidas",
    equipo: "General",
    descripcion: "Calidad Premium 1:1 con todos los parches y etiquetas oficiales.",
    imagenes: ["${document.getElementById('p-img').value}"],
    stock: true
},`;
            mostrarCodigo(code);
        }

        function crearResena() {
            const code = `{
    estrellas: 5,
    texto: "${document.getElementById('r-texto').value}",
    inicial: "${document.getElementById('r-inicial').value.toUpperCase()}",
    nombre: "${document.getElementById('r-nombre').value}",
    verificado: true
},`;
            mostrarCodigo(code);
        }

        function crearPromo() {
            const code = `"${document.getElementById('c-codigo').value.toUpperCase()}",`;
            mostrarCodigo(code);
        }

        function mostrarCodigo(txt) {
            document.getElementById('codigo-final').innerText = txt;
            document.getElementById('salida-container').style.display = 'block';
        }

        function copiarAlPortapapeles() {
            const text = document.getElementById('codigo-final').innerText;
            navigator.clipboard.writeText(text);
            alert("Código copiado. Pégalo en tu archivo .js correspondiente.");
        }
    </script>
</body>
</html>
