<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Admin - La 12 Jersey Store</title>
  <link rel="stylesheet" href="admin.css">
</head>
<body>

<div id="inicio-admin" class="seccion-admin activo">
  <h1>⚙️ Panel Admin</h1>
  <div class="botones-admin">
    <button onclick="abrirSeccion('productos')">📦 Productos</button>
    <button onclick="abrirSeccion('resenas')">⭐ Reseñas</button>
    <button onclick="abrirSeccion('promos')">🎁 Promos</button>
  </div>
</div>

<div id="productos" class="seccion-admin">
  <button class="volver" onclick="volverInicio()">⬅ Volver</button>
  <h2>Agregar Producto</h2>
  <p class="referencia">📁 Copiar en: productos.js</p>

  <input type="text" id="nombre" placeholder="Nombre del producto">
  <input type="number" id="precio" placeholder="Precio">

  <select id="tipoProducto">
    <option value="mundial">Copa Mundial 2026</option>
    <option value="temporada">Temporada 25/26</option>
    <option value="retro-clubes">Retro Clubes</option>
    <option value="retro-selecciones">Retro Selecciones</option>
    <option value="kids">Niño</option>
    <option value="anime">Anime</option>
  </select>

  <input type="text" id="liga" placeholder="Liga (ej: La Liga)">
  <input type="text" id="equipo" placeholder="Equipo (ej: Real Madrid)">
  <input type="text" id="imagen" placeholder="Imagen principal (img/productos/ejemplo.jpg)">
  <input type="text" id="imagen2" placeholder="Imagen secundaria (opcional)">
  <textarea id="descripcion" placeholder="Descripción del producto"></textarea>

  <button onclick="generarProducto()" class="btn-generar">Generar producto</button>

  <pre id="resultado-producto" class="resultado"></pre>
  <button class="btn-copiar" onclick="copiarTexto('resultado-producto')">📋 Copiar Código</button>
</div>

<div id="resenas" class="seccion-admin">
  <button class="volver" onclick="volverInicio()">⬅ Volver</button>
  <h2>Agregar Reseña</h2>
  <p class="referencia">📁 Copiar en: resenas.html (Muro de valoraciones)</p>

  <input type="text" id="resena-nombre" placeholder="Nombre del cliente">
  <select id="resena-estrellas">
    <option value="⭐⭐⭐⭐⭐">⭐⭐⭐⭐⭐</option>
    <option value="⭐⭐⭐⭐">⭐⭐⭐⭐</option>
    <option value="⭐⭐⭐">⭐⭐⭐</option>
  </select>
  <textarea id="resena-comentario" placeholder="Comentario"></textarea>
  <input type="text" id="resena-producto" placeholder="Producto comprado (ej: Real Madrid Local)">

  <button onclick="generarResena()" class="btn-generar">Generar reseña</button>

  <pre id="resultado-resena" class="resultado"></pre>
  <button class="btn-copiar" onclick="copiarTexto('resultado-resena')">📋 Copiar Código</button>
</div>

<div id="promos" class="seccion-admin">
  <button class="volver" onclick="volverInicio()">⬅ Volver</button>
  <h2>Promociones</h2>
  <p class="referencia">📁 Copiar en: promo.js (Dentro del arreglo cupones)</p>

  <input type="text" id="cupon-codigo" placeholder="Código (ej: LA12-20)">
  <input type="number" step="0.01" id="cupon-descuento" placeholder="Descuento (0.20 = 20%)">

  <button onclick="generarPromo()" class="btn-generar">Generar promo</button>

  <pre id="resultado-promo" class="resultado"></pre>
  <button class="btn-copiar" onclick="copiarTexto('resultado-promo')">📋 Copiar Código</button>
</div>

<script src="admin.js"></script>
</body>
</html>
