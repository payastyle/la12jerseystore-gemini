<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administración - La 12</title>
    <link rel="stylesheet" href="admin.css">
</head>
<body>

    <div class="admin-container">
        <h2>⚙️ Generador de Jerseys</h2>
        
        <div class="admin-card">
            <div class="form-row">
                <div class="form-group">
                    <label>Nombre del Jersey</label>
                    <input type="text" id="nombre" placeholder="Ej: Real Madrid Local 23/24" required>
                </div>
                <div class="form-group">
                    <label>Precio de Venta ($)</label>
                    <input type="number" id="precio" placeholder="Ej: 1200" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Tipo / Categoría</label>
                    <select id="tipo">
                        <option value="Fan">Versión Fan</option>
                        <option value="Jugador">Versión Jugador</option>
                        <option value="Retro">Retro</option>
                        <option value="Kids">Niños / Kids</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Marca</label>
                    <select id="marca">
                        <option value="Nike">Nike</option>
                        <option value="Adidas">Adidas</option>
                        <option value="Puma">Puma</option>
                        <option value="Jordan">Jordan</option>
                        <option value="Reebok">Reebok</option>
                        <option value="Charly">Charly</option>
                        <option value="Otro">Otro / Genérica</option>
                    </select>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Liga</label>
                    <input type="text" id="liga" placeholder="Ej: La Liga, Premier League...">
                </div>
                <div class="form-group">
                    <label>Equipo / Selección</label>
                    <input type="text" id="equipo" placeholder="Ej: Real Madrid">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Ruta Imagen 1 (Principal)</label>
                    <input type="text" id="img1" placeholder="Ej: img/rm-local-1.jpg" required>
                </div>
                <div class="form-group">
                    <label>Ruta Imagen 2 (Opcional)</label>
                    <input type="text" id="img2" placeholder="Ej: img/rm-local-2.jpg">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Descripción Corta</label>
                    <textarea id="desc" placeholder="Jersey calidad premium 1:1, tela transpirable..."></textarea>
                </div>
            </div>

            <button class="btn-generar" onclick="generarProducto()">GENERAR CÓDIGO</button>

            <div class="resultado-contenedor">
                <label>Copia esto en tu archivo productos.js:</label>
                <pre id="resultado-producto">Esperando datos...</pre>
                
                <button onclick="copiarCodigo()" style="margin-top: 15px; padding: 12px; background: #333; color: #fff; border: 1px solid var(--accent); cursor: pointer; border-radius: 6px; width: 100%; font-weight: bold; text-transform: uppercase; transition: 0.3s;">
                    📋 Copiar Código al Portapapeles
                </button>
                
                <p class="copy-hint" style="margin-top: 15px;">* Pega el código antes de la llave final ] en tu archivo productos.js</p>
            </div>
        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
