<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Admin - La 12 Jersey Store</title>
  <link rel="stylesheet" href="admin.css">
</head>

<body>

<!-- ================= INICIO ================= -->
<div id="inicio-admin" class="inicio-admin">

  <h1>⚙️ Panel Admin</h1>

  <div class="botones-admin">
    <button onclick="abrirSeccion('productos')">📦 Productos</button>
    <button onclick="abrirSeccion('resenas')">⭐ Reseñas</button>
    <button onclick="abrirSeccion('promos')">🎁 Promos</button>
  </div>

</div>

<!-- ================= PRODUCTOS ================= -->
<div id="productos" class="seccion">

  <button class="volver" onclick="volverInicio()">⬅ Volver</button>

  <h2>Agregar Producto</h2>
  <p class="referencia">📁 Copiar en: productos.js</p>

  <input type="text" id="nombre" placeholder="Nombre del producto">
  <input type="number" id="precio" placeholder="Precio">

  <select id="tipoProducto">
    <option value="mundial">Copa Mundial 2026</option>
    <option value="reciente">Temporada 25/26</option>
    <option value="retro">Retro</option>
    <option value="niño">Niño</option>
    <option value="anime">Anime</option>
  </select>

  <input type="text" id="liga" placeholder="Liga (ej: la liga)">
  <input type="text" id="equipo" placeholder="Equipo (ej: real madrid)">

  <input type="text" id="imagen" placeholder="Imagen principal (img/productos/ejemplo.jpg)">
  <input type="text" id="imagen2" placeholder="Imagen secundaria (opcional)">

  <textarea id="descripcion" placeholder="Descripción del producto"></textarea>

  <button onclick="generarProducto()">Generar producto</button>

  <pre id="resultado-producto"></pre>

</div>

<!-- ================= RESEÑAS ================= -->
<div id="resenas" class="seccion">

  <button class="volver" onclick="volverInicio()">⬅ Volver</button>

  <h2>Agregar Reseña</h2>
  <p class="referencia">📁 Copiar en: resenas.js</p>

  <input type="text" id="resena-nombre" placeholder="Nombre del cliente">

  <select id="resena-estrellas">
    <option value="5">⭐⭐⭐⭐⭐</option>
    <option value="4">⭐⭐⭐⭐</option>
    <option value="3">⭐⭐⭐</option>
  </select>

  <textarea id="resena-comentario" placeholder="Comentario"></textarea>

  <input type="text" id="resena-imagen" placeholder="Imagen (img/resenas/ejemplo.jpg)">

  <button onclick="generarResena()">Generar reseña</button>

  <pre id="resultado-resena"></pre>

</div>

<!-- ================= PROMOS ================= -->
<div id="promos" class="seccion">

  <button class="volver" onclick="volverInicio()">⬅ Volver</button>

  <h2>Promociones</h2>
  <p class="referencia">📁 Copiar en: promos.js</p>

  <input type="text" id="promo-texto" placeholder="Texto promo (ej: 20% OFF)">

  <input type="text" id="cupon-codigo" placeholder="Código (ej: LA12-20)">
  <input type="number" step="0.01" id="cupon-descuento" placeholder="Descuento (0.20 = 20%)">

  <input type="date" id="cupon-expira">

  <button onclick="generarPromo()">Generar promo</button>

  <pre id="resultado-promo"></pre>

</div>

<!-- ================= JS ================= -->
<script src="admin.js"></script>

</body>
</html>
