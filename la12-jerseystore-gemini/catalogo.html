<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo | La 12 Jersey Store</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/tienda.css">
</head>
<body>

    <div id="header-placeholder"></div>

    <main class="plp-main">
        <header class="plp-header">
            <h1 id="titulo-categoria">Todos los Jerseys</h1>
            <p id="contador-productos" class="plp-count">Cargando productos...</p>
        </header>

        <section class="plp-toolbar">
            <div class="plp-filters-trigger">
                <button onclick="toggleSidebar()" class="btn-filter-toggle">
                    Ocultar Filtros <i class="bi bi-sliders"></i>
                </button>
            </div>
            <div class="plp-sort">
                <select id="ordenar-select" onchange="ejecutarFiltros()">
                    <option value="recientes">Lo más nuevo</option>
                    <option value="baratos">Precio: Menor a Mayor</option>
                    <option value="caros">Precio: Mayor a Menor</option>
                </select>
            </div>
        </section>

        <div class="plp-layout">
            <aside class="plp-sidebar" id="plp-sidebar">
                <div class="filter-group">
                    <h3>Ligas</h3>
                    <ul id="lista-ligas">
                        <li onclick="filtrarPor('liga', 'Liga MX')">Liga MX</li>
                        <li onclick="filtrarPor('liga', 'Premier League')">Premier League</li>
                        <li onclick="filtrarPor('liga', 'LaLiga')">LaLiga</li>
                        <li onclick="filtrarPor('liga', 'Serie A')">Serie A</li>
                        <li onclick="filtrarPor('liga', 'Bundesliga')">Bundesliga</li>
                    </ul>
                </div>

                <div class="filter-group">
                    <h3>Marcas</h3>
                    <ul id="lista-marcas">
                        <li onclick="filtrarPor('marca', 'Nike')">Nike</li>
                        <li onclick="filtrarPor('marca', 'Adidas')">Adidas</li>
                        <li onclick="filtrarPor('marca', 'Puma')">Puma</li>
                        <li onclick="filtrarPor('marca', 'Jordan')">Jordan</li>
                    </ul>
                </div>

                <button class="btn-reset-filtros" onclick="limpiarFiltros()">Limpiar Todo</button>
            </aside>

            <section class="plp-grid-container">
                <div class="grid-nike" id="contenedor-catalogo">
                    </div>
            </section>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="js/main.js"></script>
    <script src="js/productos.js"></script>
    <script src="js/catalogo.js"></script>
</body>
</html>
